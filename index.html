 <!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BBM</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class = "MasterLayout">

            <div class = "OutputLayout" id = "OutputArea"></div>

            <input type="file" id="InputJson" accept=".json" class = "SingleLayout">
            <button class = "SingleLayout" onclick = "InsertClick()">Insert</button>
            <input type = "date" class = "DateTimeValueLayout" id = "InputDate">

            <button class = "SingleLayout" onclick = "SaveClick()">Save</button>
            <button class = "SingleLayout" onclick = "ComputeClick()">Compute</button>
            <select id = "InputTime" class = "SingleLayout">
                <option value="Morning">Morning</option><option value="Afternoon">Afternoon</option>
            </select>
            <textarea class = "SingleLayout" id = "InputPrice"></textarea>
        </div>

        <script src="code.js"></script>
    </body>
</html>
