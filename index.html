<!-- 
 Brunella Business Management 
 -->
 
 <!DOCTYPE html>

<html lang="it">

    <head>
        <meta charset="UTF-8">
        <title>BBM</title>

        <style>
            html, body 
            {
                margin: 0;
                height: 100%;
            }
            
            body {
                display: grid;
                place-items: center; 
            }

            .MasterLayout
            {
                display: grid;
                align-items: center;
                justify-content: center;
                grid-template-columns: 100%;
                grid-template-rows: 50% 50%;
                box-sizing: border-box;
                height: 75%;
                width: 75%;
            }

            .LowerLayout
            {
                display: grid;
                grid-template-columns: 50% 50%;
                grid-template-rows: 100%;
                box-sizing: border-box;
                height: 100%;
                width: 100%;
            }

            .ButtonsLayout
            {
                display: grid;
                grid-template-columns: 50% 50%;
                grid-template-rows: 50% 50%;
                box-sizing: border-box;
                height: 100%;
                width: 100%;
            }

            .DateTimeValueLayout
            {
                display: grid;
                grid-template-columns: 100%;
                grid-template-rows: 50% 50%;
                box-sizing: border-box;
                height: 100%;
                width: 100%;  
            }

            .TimeValueLayout
            {
                display: grid;
                grid-template-columns: 50% 50%;
                grid-template-rows: 100%;
                box-sizing: border-box;
                height: 100%;
                width: 100%;  
            }

            .NormalText 
            {
                align-items: center;
                justify-content: center;
                border: 1px solid #333;
                box-sizing: border-box;
                font-family: monospace;
                font-size: 5em;
                width: 100%;
                height: 100%;                    
            }

            .SmallText 
            {
                align-items: center;
                justify-content: center;
                border: 1px solid #333;
                box-sizing: border-box;
                font-family: monospace;
                font-size: 2.5em;
                width: 100%;
                height: 100%;                    
            }

        </style>
    </head>

    <body>

        <div class = "MasterLayout">

            <div class = "SmallText" id = "OutputArea"></div>

            <div class = "LowerLayout">
                <div class = "ButtonsLayout">
                    <input type="file" id="InputJson" accept=".json" class = "SmallText">
                    <button class = "SmallText" onclick = "InsertClick()">Insert</button>
                    <button class = "SmallText" onclick = "SaveClick()">Save</button>
                    <button class = "SmallText" onclick = "ComputeClick()">Compute</button>
                </div>

                <div class = "DateTimeValueLayout">
                    <input type = "date" class = "SmallText" id = "InputDate">

                    <div class = "TimeValueLayout">
                        <select id = "InputTime" class = "SmallText">
                            <option value="Morning">Morning</option><option value="Afternoon">Afternoon</option>
                        </select>
                        <textarea class = "SmallText" id = "InputPrice"></textarea>
                    </div>
                </div>
            </div>

        <script>
            // VARIABILI DI STATO
            let State_BrunellaLoaded;
            let State_Values;
            let State_Dates;
            let State_Times;
            let State_Resamples;

            // FUNZIONI PILOTA E GENERICHE
            StateFunction_Init();

            function ValidateValueDate( InputValue, InputDate, InputTime )
            {
                let TestValue = parseInt( InputValue );
                let TestDate = new Date( InputDate );

                if( !Number.isNaN( TestValue ) && !Number.isNaN( TestDate.getTime() ) && !( InputTime !== 'Morning' && InputTime !=='Afternoon' ) )
                {
                    return true;
                }
                else{ return false; }
            }

            document.getElementById( 'InputJson' ).addEventListener( 'change', 
                ( ChangeEvent ) => 
                {
                    let Reader = new FileReader();
                    Reader.onload = ( EndLoadEvent ) =>
                    {
                        StateFunction_Load( JSON.parse( Reader.result ) );
                        OutputFunction_Load();
                    }

                    Reader.readAsText( ChangeEvent.target.files[0] ); // parte la lettura che triggera la callback onload
                }
            );

            function InsertClick()
            { 

                let PopupResult = OutputFunction_PopupConfirmInsert();

                StateFunction_Insert( 
                    PopupResult,
                    document.getElementById( "InputPrice" ).value,
                    document.getElementById( "InputDate" ).value,
                    document.getElementById( "InputTime" ).value 
                );
		
		        OutputFunction_Insert(
                    PopupResult,
                    document.getElementById( "InputPrice" ).value,
                    document.getElementById( "InputDate" ).value,
                    document.getElementById( "InputTime" ).value 
		        ); 
            }

            function ComputeClick()
            { 
                OutputFunction_Render(
                    document.getElementById( "InputPrice" ).value,
                    document.getElementById( "InputDate" ).value,
                    document.getElementById( "InputTime" ).value  
                ); 
            }

            function SaveClick(){ OutputFunction_Save(); }

            function Mean( Data )
            {
                let Mean_ = 0;

                for( let Cur = 0; Cur < Data.length; Cur ++ )
                {
                    Mean_ += Data[ Cur ];
                }

                Mean_ /= Data.length;

                return Mean_;
            }

            function MAD( Data )
            {
                let Mean_ = Mean( Data );
                let MAD_ = 0;

                for( let Cur = 0; Cur < Data.length; Cur ++ )
                {
                    MAD_ += Math.abs( Mean_ - Data[ Cur ] );
                }

                MAD_ /= Data.length;

                return MAD_;
            }

            // FUNZIONI DI STATO
            function StateFunction_Init()
            {
                State_BrunellaLoaded = false;
                State_Values = [];
                State_Dates = [];
                State_Times = [];
                State_Resamples = 1000000;
            }

            function StateFunction_Load( InputJSON )
            {
                if( InputJSON[ "Values" ] && InputJSON[ "Dates" ] && InputJSON[ "Times" ] )
                {
                    State_Values = InputJSON[ "Values" ];
                    State_Dates = InputJSON[ "Dates" ];
                    State_Times = InputJSON[ "Times" ];
                    if( State_Values != [] && State_Dates != [] && State_Times != [] &&
                        ( State_Values.length == State_Dates.length && State_Values.length == State_Times.length )
                    )
                    {
                        State_BrunellaLoaded = true;
                    }
                    else
                    {
                        State_Values = [];
                        State_Dates = [];
                        State_Times = [];
                        State_BrunellaLoaded = false;
                    }
                }
                else
                {
                    State_BrunellaLoaded = false;
                }
            }

            function StateFunction_Insert( PopupResult, InputValue, InputDate, InputTime )
            {
                if( State_BrunellaLoaded && PopupResult && ValidateValueDate( InputValue, InputDate, InputTime ) )
                {
                    State_Values.push( parseInt( InputValue ) );
                    State_Dates.push( InputDate );
                    State_Times.push( InputTime );
                }
            }

            // FUNZIONI DI OUTPUT ( RENDER DELLA PAGINA )
            function OutputFunction_NoBrunella()
            {
                alert( 'Please upload Brunella.json :-()');
            }

            function OutputFunction_PopupConfirmInsert()
            {
                if( State_BrunellaLoaded )
                {
                    let Index = State_Dates.length - 1;
                    return confirm( 'Insert the value?\nLast inserted value: ' + parseInt( State_Values[ Index ] ) + ' @ ' + State_Dates[ Index ] + ' ' + State_Times[ Index ] );
                }
                else{ OutputFunction_NoBrunella(); }
            }

	        function OutputFunction_Render( InputValue, InputDate, InputTime )
            {
                if( State_BrunellaLoaded )
                {
                    if( ValidateValueDate( InputValue, InputDate, InputTime ) )
                    {
                        // stima probabilità che dato il valore di oggi nei restanti giorni di vendita il prezzo sia più basso
                        let Value = parseInt( InputValue );
                        let Date_ = new Date( InputDate );

                        let RemainingAttempts = 0;
                
                        if( Date_.getDay() == 0 )
                        {
                            RemainingAttempts = 12;
                        }
                        else
                        {
                            let ActualAttempts = ( Date_.getDay() - 1 ) * 2; // convenzione anglosassone domenica giorno 0
                            if( InputTime === 'Afternoon' ){ ActualAttempts += 1; }

                            RemainingAttempts = 11 - ActualAttempts;
                        }

                        let TodayBestVector = [];

                        for( let CurResample = 0; CurResample < State_Resamples; CurResample ++ )
                        {
                            let TodayBest = 100;
                            for( let CurTest = 0; CurTest < RemainingAttempts; CurTest ++ )
                            {
                                if( State_Values[ Math.floor( Math.random() * State_Values.length ) ] > Value )
                                {
                                    TodayBest = 0;
                                    break;
                                }
                            }
                            TodayBestVector.push( TodayBest );
                        }

                        let MeanTodayBestVector = Mean( TodayBestVector );
                        let MADTodayBestVector = MAD ( TodayBestVector );
                        
                        if( RemainingAttempts == 12 )
                        {
                                    document.getElementById( "OutputArea" ).innerHTML = 'Probability of not selling at a better price: ' +
                                MeanTodayBestVector.toFixed( 1 ) + ' \u00B1 ' + MADTodayBestVector.toFixed( 1 ) + '[ % ]';
                        }
                        else
                        {
                                    document.getElementById( "OutputArea" ).innerHTML = 'Probability that this is the best price: ' +
                                +  MeanTodayBestVector.toFixed( 1 ) + ' \u00B1 ' + MADTodayBestVector.toFixed( 1 ) + '[ % ]';
                        }
                    }
                    else
                    {
                        OutputFunction_ErrorValueDate();
                    } 
                }
                else{ OutputFunction_NoBrunella(); }   
            }

            function OutputFunction_ErrorValueDate()
            {
                alert( 'Invalid value or date :-(' );
                //document.getElementById( "OutputArea" ).innerHTML = 'Invalid value or date :-(';
            }

            function OutputFunction_Save()
            {
                if( State_BrunellaLoaded )
                {
                    let BlobJSON = new Blob( 
                        [ JSON.stringify( { "Values" : State_Values, "Dates" : State_Dates, "Times" : State_Times } ) ],
                        { type: "application/json" }
                        );

                    let Download = document.createElement( 'a' ); // inserisce tag a che è per collegamenti ipertestuali
                    let Url = URL.createObjectURL( BlobJSON );
                    Download.href = Url;
                    Download.download = "Brunella.json";
                    Download.click();
                    URL.revokeObjectURL( Url );
                }
                else
                {
                    OutputFunction_NoBrunella();
                }
            }

        function OutputFunction_Load()
        {
            if( !State_BrunellaLoaded )
            {
                alert( 'Bad JSON file :-(' );
            }
        }

	    function OutputFunction_Insert( PopupResult, InputValue, InputDate, InputTime )
	    { 
            if( PopupResult )
            {
                if( ValidateValueDate( InputValue, InputDate, InputTime ) )
                {
                    let Value = parseInt( InputValue );
                    let Date_ = new Date( InputDate );
                
                    if( Date_.getDay() == 0 )
                    {	
                        //document.getElementById( "OutputArea" ).innerHTML = 'Sunday can\'t be part of selling data :-(';
                        alert( 'Sunday can\'t be part of selling data :-(' );
                    }
                    else
                    {	
                        //document.getElementById( "OutputArea" ).innerHTML = 'Inserted data, remember to download updated file :-)';
                        alert( 'Inserted new data, remember to save updated file :-)' );
                    }
                }
                else
                {
                    OutputFunction_ErrorValueDate();
                }
            }
        }

        </script>

    </body>
</html>
