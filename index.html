 <!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BBM</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class = "MasterLayout">

            <div class = "Text" id = "OutputArea"></div>

            <div class = "LowerLayout">
                <div class = "ButtonsLayout">
                    <input type="file" id="InputJson" accept=".json" class = "Text">
                    <button class = "Text" onclick = "InsertClick()">Insert</button>
                    <button class = "Text" onclick = "SaveClick()">Save</button>
                    <button class = "Text" onclick = "ComputeClick()">Compute</button>
                </div>

                <div class = "DateTimeValueLayout">
                    <input type = "date" class = "Text" id = "InputDate">

                    <div class = "TimeValueLayout">
                        <select id = "InputTime" class = "Text">
                            <option value="Morning">Morning</option><option value="Afternoon">Afternoon</option>
                        </select>
                        <textarea class = "Text" id = "InputPrice"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <script src="code.js"></script>
    </body>
</html>
