 Brunella Business Management

 <!DOCTYPE html>

<html lang="it">

    <head>
        <meta charset="UTF-8">
        <title>BBM</title>

        <style>
            html, body 
            {
                margin: 0;
                height: 100%;
            }

            .MasterLayout
            {
                display: grid;
                grid-template-columns: 33.33% 33.33% 33.33%;
                grid-template-rows: 50% 50%;
                box-sizing: border-box;
                height: 100%;
                width: 100%;
            }

            .InputLayout
            {
                display: grid;
                grid-template-columns: 100%;
                grid-template-rows: 50% 50%;
                box-sizing: border-box;
                height: 100%;
                width: 100%;
            }

            .NormalText 
            {
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px solid #333;
                box-sizing: border-box;
                font-family: monospace;
                font-size: 5em;
                width: 100%;
                height: 100%;                    
            }

            .SmallText 
            {
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px solid #333;
                box-sizing: border-box;
                font-family: monospace;
                font-size: 2.5em;
                width: 100%;
                height: 100%;                    
            }

        </style>
    </head>

    <body>

        <div class = "MasterLayout">

            <input type="file" id="InputJson" accept=".json" class = "SmallText">
			<button class = "NormalText" onclick = "SaveClick()">Save</button>
            <div class = "NormalText" id = "OutputArea">...</div>

            <button class = "NormalText" onclick = "ComputeClick()">Compute</button>
			<button class = "NormalText" onclick = "InsertClick()">Insert</button>
            <div class = "InputLayout">
                <textarea class = "NormalText" id = "InputPrice"></textarea>
                <input type="datetime-local" class = "SmallText" id = "InputDate" >
            </div>
        </div>

        <script>

            let State_Values = [];
            let State_Dates = [];

            // FUNZIONI PILOTA
            document.getElementById( 'InputJson' ).addEventListener( 'change', 
                ( ChangeEvent ) => 
                {
                    let Reader = new FileReader();
                    Reader.onload = ( EndLoadEvent ) =>
                    {
                        StateFunction_Load( JSON.parse( Reader.result ) );
                    }

                    Reader.readAsText( ChangeEvent.target.files[0] ); // parte la lettura che triggera la callback onload
                }
            );

            function InsertClick()
            { 
                StateFunction_Add( 
                    document.getElementById( "InputPrice" ).value ,
                    document.getElementById( "InputDate" ).value 
                ); 
            }

            function ComputeClick(){ OutputFunction_Render(); }

            function SaveClick(){ OutputFunction_Save(); }

            // FUNZIONI DI STATO
            function StateFunction_Load( InputJSON )
            {
                State_Values = InputJSON[ "Values" ];
                State_Dates = InputJSON[ "Dates" ];
            }

            function StateFunction_Add( InputValue, InputDate )
            {
                State_Values.push( parseInt( InputValue ) );
                State_Dates.push( InputDate );
            }

            // FUNZIONI DI OUTPUT ( RENDER DELLA PAGINA )
            function OutputFunction_Render()
            {

            }

            function OutputFunction_Save()
            {
                let BlobJSON = new Blob( 
                    [ JSON.stringify( { "Values" : State_Values, "Dates" : State_Dates } ) ],
                     { type: "application/json" }
                    );

                let Download = document.createElement( 'a' ); // inserisce tag a che è per collegamenti ipertestuali
                let Url = URL.createObjectURL( BlobJSON );
                Download.href = Url;
                Download.download = "Brunella.json";
                Download.click();
                URL.revokeObjectURL( Url );
            }
        </script>

    </body>
</html>
